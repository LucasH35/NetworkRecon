[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider

markers =
    unit: Tests unitaires rapides (pas de dépendances externes)
    integration: Tests d'intégration API (mock MongoDB)
    slow: Tests lents (simulation de scans complets)
    smoke: Tests de fumée (vérification minimale)

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
