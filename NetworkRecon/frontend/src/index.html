<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetworkRecon - Reconnaissance Réseau</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a', 950: '#020617' },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-950 text-surface-100 font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-surface-900 border-r border-surface-700 flex flex-col transition-all duration-300 ease-in-out lg:relative lg:translate-x-0 -translate-x-full fixed z-40 h-full">
            <!-- Logo -->
            <div class="p-4 border-b border-surface-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/>
                        </svg>
                    </div>
                    <span class="text-xl font-bold text-white">NetworkRecon</span>
                </div>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                <a href="#dashboard" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-surface-300 hover:bg-surface-800 hover:text-white transition-all" data-section="dashboard">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="#campaigns" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-surface-300 hover:bg-surface-800 hover:text-white transition-all" data-section="campaigns">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                    </svg>
                    <span>Campagnes de scan</span>
                </a>
                <a href="#hosts" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-surface-300 hover:bg-surface-800 hover:text-white transition-all" data-section="hosts">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"/>
                    </svg>
                    <span>Hôtes découverts</span>
                </a>
            </nav>

            <!-- Footer sidebar -->
            <div class="p-4 border-t border-surface-700">
                <div class="flex items-center gap-2 text-xs text-surface-500">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <span>API Connectée</span>
                </div>
            </div>
        </aside>

        <!-- Overlay mobile -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 lg:hidden hidden" onclick="toggleSidebar()"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <header class="h-16 bg-surface-900 border-b border-surface-700 flex items-center justify-between px-4 lg:px-6 flex-shrink-0">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-surface-800 text-surface-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                    <h1 id="page-title" class="text-lg font-semibold text-white">Dashboard</h1>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="resetAllData()" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 hover:bg-red-500/20 hover:text-red-300 transition-colors text-sm font-medium">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        <span class="hidden sm:inline">Réinitialiser</span>
                    </button>
                    <button onclick="showNewScanModal()" class="flex items-center gap-2 px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-lg transition-colors text-sm font-medium">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                        </svg>
                        <span class="hidden sm:inline">Nouveau scan</span>
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <main id="app" class="flex-1 overflow-y-auto p-4 lg:p-6">
                <!-- Dynamic content loaded here -->
            </main>
        </div>
    </div>

    <!-- New Scan Modal -->
    <div id="new-scan-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="hideNewScanModal()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-lg mx-4">
            <div class="bg-surface-800 rounded-xl shadow-2xl border border-surface-700">
                <div class="flex items-center justify-between p-4 border-b border-surface-700">
                    <h3 class="text-lg font-semibold text-white">Nouveau scan réseau</h3>
                    <button onclick="hideNewScanModal()" class="p-1 rounded-lg hover:bg-surface-700 text-surface-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <form id="new-scan-form" class="p-4 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-surface-300 mb-1.5">Cible (réseau ou domaine) *</label>
                        <input type="text" name="target" required placeholder="Ex: 192.168.2.0/24 ou example.com" value="192.168.2.0/24" class="w-full px-3 py-2 bg-surface-700 border border-surface-600 rounded-lg text-white font-mono placeholder-surface-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                        <p class="text-xs text-surface-500 mt-1">Plage CIDR (ex: 192.168.2.0/24) ou nom de domaine (ex: example.com)</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-surface-300 mb-1.5">Nom de la campagne</label>
                        <input type="text" name="name" required placeholder="Ex: Scan réseau interne" class="w-full px-3 py-2 bg-surface-700 border border-surface-600 rounded-lg text-white placeholder-surface-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-surface-300 mb-1.5">Description</label>
                        <textarea name="description" rows="2" placeholder="Description optionnelle..." class="w-full px-3 py-2 bg-surface-700 border border-surface-600 rounded-lg text-white placeholder-surface-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent resize-none"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-surface-300 mb-1.5">Type de scan</label>
                            <select name="scan_type" class="w-full px-3 py-2 bg-surface-700 border border-surface-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                                <option value="full">Complet</option>
                                <option value="quick">Rapide</option>
                                <option value="stealth">Furtif</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-surface-300 mb-1.5">Ports (optionnel)</label>
                            <input type="text" name="ports_range" placeholder="Ex: 22,80,443" class="w-full px-3 py-2 bg-surface-700 border border-surface-600 rounded-lg text-white placeholder-surface-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" name="authorized" id="authorized" class="w-4 h-4 rounded bg-surface-700 border-surface-600 text-primary-600 focus:ring-primary-500">
                        <label for="authorized" class="text-sm text-surface-300">Scan autorisé (confirmation nécessaire)</label>
                    </div>
                    <div class="flex justify-end gap-3 pt-2">
                        <button type="button" onclick="hideNewScanModal()" class="px-4 py-2 text-surface-300 hover:text-white hover:bg-surface-700 rounded-lg transition-colors text-sm font-medium">Annuler</button>
                        <button type="submit" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-lg transition-colors text-sm font-medium">Lancer le scan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js?v=5"></script>
    <script src="js/dashboard.js?v=5"></script>
    <script src="js/campaigns.js?v=4"></script>
    <script src="js/hosts.js?v=4"></script>
    <script src="js/vulnerabilities.js?v=4"></script>
    <script src="js/mitre.js?v=4"></script>
    <script src="js/auth-tests.js?v=5"></script>
    <script src="js/sqlmap.js?v=7"></script>
    <script src="js/reports.js?v=4"></script>
    <script src="js/app.js?v=6"></script>
</body>
</html>
